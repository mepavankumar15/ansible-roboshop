- name: catalogue setup 
  hosts: catalogue
  become: yes
  tasks:
  - name: disable nodejs
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enable nodejs
    ansible.builtin.command: dnf module enable nodejs -y

  - name: install nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: present

  - name: user roboshop
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"
  
  - name: mkdir app
    ansible.builtin.file:
      path: /app
      state: directory

  - name: cd to app
    ansible.builtin.command: cd /app

  - name: download files 
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip

  - name: unzip file
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes