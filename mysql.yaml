- name: configure mysql
  hosts: mysql
  become: yes
  tasks:
  - name: install mysql-server
    ansible.builtin.dnf:
      name: mysql-server
      state: present

  - name: start and enable mysqld
    ansible.builtin.service:
      name: mysqld
      enabled: yes
      state: restarted
  
  - name: setup root password
    ansible.builtin.command: mysql_secure_installation --set-root-pass RoboShop@1