- name: configure payment server
  hosts: payment
  become: yes
  tasks: 
  - name: install python
    ansible.builtin.dnf:
      name: "{{ item}}"
      state: present
    loop:
    - python3
    - gcc
    - python3-devel

  - name: adding user roboshop
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: mkdir /app
    ansible.builtin.file:
    path: /app
    state: directory

  - name: cd to app
    ansible.builtin.command: cd /app

  - name: download files 
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip

  - name: unzip file
    ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes


  - name: install dependencies
    ansible.builtin.pip:
      requirements: requirements.txt
      executable: pip3.9
    args:
      chdir: /app

  - name: copy payment service
    ansible.builtin.copy:
      src: payment.service
      dest: /etc/systemd/system/payment.service

  - name: daemon reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: start and enable payment
    ansible.builtin.service:
      name: payment
      enabled: yes
      state: restarted

